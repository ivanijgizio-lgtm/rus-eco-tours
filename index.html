<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Те же meta + стили, добавим CSS vars и анимации -->
    <style>
        :root {
            --primary: #27ae60;
            --bg: #e8f5e8;
            --card-bg: rgba(255,255,255,0.95);
        }
        [data-theme="dark"] { --bg: #1a3c1a; --card-bg: rgba(0,0,0,0.8); color: white; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px,1fr)); gap: 25px; }
        .tour-item { animation: fadeInUp 0.6s ease forwards; opacity: 0; transform: translateY(30px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 25px; max-width: 500px; }
        .svg-map { width: 100%; height: 400px; cursor: pointer; }
        .slider { overflow-x: auto; scroll-snap-type: x mandatory; display: flex; gap: 20px; padding: 20px 0; }
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--primary); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    
    <!-- Header/search как раньше -->
    
    <section class="map-section">
        <h2>Выберите регион на карте</h2>
        <svg class="svg-map" viewBox="0 0 800 1000" onclick="selectRegion(event)">
            <!-- Упрощенная SVG карта РФ (регионы кликабельны) -->
            <rect x="100" y="200" width="80" height="60" fill="#4caf50" data-region="Алтай" stroke="#27ae60"/>
            <text x="140" y="240" fill="white" font-size="12">Алтай</text>
            <!-- Байкал, Кавказ, Калмыкия... (добавить 10+ регионов) -->
        </svg>
    </section>

    <section id="tours-section">
        <div class="slider" id="popular-slider">
            <!-- Динамически заполняется JS -->
        </div>
        <div class="tour-grid" id="tour-grid"></div>
    </section>

    <!-- Модал -->
    <div class="modal" id="tour-modal">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="modal-desc"></p>
            <button onclick="bookTour()">Забронировать (demo)</button>
            <button onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // Данные local (50+ туров)
        const tours = [
            { id:1, name:'Алтайский трек', region:'Алтай', price:15000, duration:'5д', rating:4.9, eco: true, img:'fas fa-mountain' },
            { id:2, name:'Байкал экспедиция', region:'Байкал', price:22000, duration:'7д', rating:4.8, eco: true, img:'fas fa-water' },
            // ... 48+ туров
        ];

        let filteredTours = [...tours];
        let currentFilters = JSON.parse(localStorage.getItem('filters')) || {};

        // Рендер туров
        function renderTours(toursList) {
            const grid = document.getElementById('tour-grid');
            grid.innerHTML = toursList.map(tour => `
                <div class="tour-card tour-item" onclick="openModal(${tour.id})">
                    <div class="tour-img"><i class="${tour.img}"></i></div>
                    <div class="tour-info">
                        <h3>${tour.name}</h3>
                        <div class="tour-location">${tour.region}</div>
                        <div class="tour-price">${tour.price}₽</div>
                        <div class="tour-duration">${tour.duration} ⭐${tour.rating}</div>
                    </div>
                </div>
            `).join('');
            // Анимация
            document.querySelectorAll('.tour-item').forEach((el,i) => {
                el.style.animationDelay = `${i*0.1}s`;
            });
        }

        // Поиск + фильтры реал-тайм
        document.querySelector('.search-input').addEventListener('input', e => {
            const query = e.target.value.toLowerCase();
            filteredTours = tours.filter(t => 
                t.name.toLowerCase().includes(query) || t.region.toLowerCase().includes(query)
            );
            applyFilters();
        });

        // Карта клик
        function selectRegion(e) {
            const region = e.target.dataset.region;
            if (region) {
                document.querySelector('.search-input').value = region;
                // Trigger search
            }
        }

        // Слайдер
        function initSlider() {
            const slider = document.getElementById('popular-slider');
            slider.innerHTML = tours.slice(0,6).map(t => `<div class="tour-card" style="flex:0 0 300px;">...</div>`).join('');
        }

        // Инициализация
        renderTours(filteredTours);
        initSlider();
        // ... остальные функции (theme, modal, filters, localStorage)
    </script>
</body>
</html>
